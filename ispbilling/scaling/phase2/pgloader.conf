-- AutoISP — bulk SQLite -> Postgres migration via pgloader.
-- Usage:
--   apt-get install -y pgloader
--   pgloader /opt/ispbilling/scaling/phase2/pgloader.conf
--
-- pgloader will:
--   1. Auto-translate SQLite schema -> Postgres equivalents
--      (INTEGER PRIMARY KEY AUTOINCREMENT -> IDENTITY, TEXT -> TEXT, etc.)
--   2. Copy ALL rows of ALL tables
--   3. Recreate indexes
--   4. Print a summary with row counts per table
--
-- Network: this MUST be run FROM the Postgres VM, not the app VM, since the
-- new Postgres server needs the SQLite file accessible via NFS / scp first.

LOAD DATABASE
     FROM sqlite:///var/lib/autoispbilling/autoispbilling.db
     INTO postgresql://autoisp:CHANGE_ME@<POSTGRES_VM_IP>:5432/autoispbilling

  WITH include drop,
       create tables,
       create indexes,
       reset sequences,
       downcase identifiers,
       data only        -- omit on first run; add after first successful structure
                        -- so subsequent runs only refresh data (for testing).
  SET work_mem to '256MB',
      maintenance_work_mem to '512MB';

-- Type casting: align SQLite-isms with Postgres conventions
CAST type DATETIME to timestamptz drop typemod keep default keep not null,
     type DATE     to date         drop typemod keep default keep not null,
     type FLOAT    to double precision,
     type BOOLEAN  to boolean,
     -- SQLite stores most fields as TEXT — keep as TEXT (Postgres compatible)
     type VARCHAR  to text;
