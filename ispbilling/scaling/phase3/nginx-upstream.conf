# Phase 3 — 3 app servers behind Nginx round-robin.
# Replace the existing single-backend `proxy_pass http://127.0.0.1:8001;`
# with `proxy_pass http://admin_pool;` after deploying this upstream block.

upstream admin_pool {
    # Phase 3 — load-balance across all app servers (least-connected algorithm
    # so a stuck worker doesn't get re-hit).
    least_conn;
    server 127.0.0.1:8001  weight=1 max_fails=3 fail_timeout=20s;
    server <APP_VM_2_IP>:8001 weight=1 max_fails=3 fail_timeout=20s;
    server <APP_VM_3_IP>:8001 weight=1 max_fails=3 fail_timeout=20s;
    keepalive 32;
}

upstream captive_pool {
    # Captive portal traffic goes to read-replica-backed VMs only.
    least_conn;
    server <APP_VM_2_IP>:8000 weight=1 max_fails=3 fail_timeout=20s;
    server <APP_VM_3_IP>:8000 weight=1 max_fails=3 fail_timeout=20s;
    keepalive 32;
}
