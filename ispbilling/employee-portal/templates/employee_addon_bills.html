{% extends "base_employee.html" %}

{% block title %}Addon Bills - Auto ISP Billing{% endblock %}

{% block content %}
<section class="content-header">
    <h1>
        Addon Bills
        <small>Manual invoice creation</small>
    </h1>
</section>

<section class="content">
    <div class="box">
        <div class="box-header with-border">
            <h3 class="box-title">Create Addon Bill</h3>
        </div>
        <div class="box-body">
            <form id="createAddonBillForm" class="form-horizontal">
                <div class="form-group">
                    <label class="col-sm-2 control-label">Customer ID:</label>
                    <div class="col-sm-4">
                        <input type="text" id="customerId" class="form-control" placeholder="Enter Customer ID" required>
                    </div>
                    <label class="col-sm-2 control-label">Bill Type:</label>
                    <div class="col-sm-4">
                        <select id="billType" class="form-control" required>
                            <option value="">Select Type</option>
                            <option value="Installation">Installation</option>
                            <option value="Equipment">Equipment</option>
                            <option value="Penalty">Penalty</option>
                            <option value="Service">Service</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">Amount:</label>
                    <div class="col-sm-4">
                        <input type="number" id="amount" class="form-control" placeholder="Enter Amount" step="0.01" required>
                    </div>
                    <label class="col-sm-2 control-label">Due Date:</label>
                    <div class="col-sm-4">
                        <input type="date" id="dueDate" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-sm-2 control-label">Description:</label>
                    <div class="col-sm-10">
                        <textarea id="description" class="form-control" rows="3" placeholder="Enter description"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-2 col-sm-10">
                        <button type="submit" class="btn btn-primary">Create Addon Bill</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="box">
        <div class="box-header with-border">
            <h3 class="box-title">Recent Addon Bills</h3>
        </div>
        <div class="box-body">
            <div class="table-responsive">
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>Bill ID</th>
                            <th>Customer ID</th>
                            <th>Bill Type</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Created At</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center">No addon bills created yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<script>
$(document).ready(function() {
    $('#createAddonBillForm').submit(function(e) {
        e.preventDefault();
        alert('Addon bill creation functionality will be implemented with backend API');
    });
});
</script>
{% endblock %}
