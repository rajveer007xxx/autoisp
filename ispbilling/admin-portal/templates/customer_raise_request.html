<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Raise Request — {{ cust.customer_name }}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:40px 16px;}
.wrap{max-width:580px;margin:0 auto;}
.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:32px 28px;box-shadow:0 10px 40px rgba(0,0,0,.4);}
h1{font-size:22px;color:#f1f5f9;font-weight:700;margin:0 0 4px;}
.sub{color:#94a3b8;font-size:13px;margin-bottom:22px;}
label{color:#94a3b8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:block;margin:12px 0 6px;}
input,select,textarea{width:100%;background:#0b1220;border:1px solid #1e293b;border-radius:8px;padding:11px 12px;color:#f1f5f9;font-size:14px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18);}
.btn{display:inline-block;padding:14px 24px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:600;width:100%;margin-top:18px;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.35);}
.btn:hover{transform:translateY(-1px);}
.ok{background:#064e3b;border:1px solid #065f46;color:#6ee7b7;padding:16px;border-radius:10px;margin-bottom:16px;}
.err{background:#7f1d1d;border:1px solid #991b1b;color:#fecaca;padding:12px;border-radius:8px;margin-top:10px;}
</style></head><body>
<div class="wrap"><div class="card" id="card">
  <h1><i class="fa fa-headset" style="color:#6366f1;"></i>&nbsp; Raise a Request</h1>
  <div class="sub">We'll route this to <b>{{ cust.customer_name }}</b>'s ISP support team.</div>
  <form id="f" onsubmit="return submitForm(event)">
    <label>Type of request</label>
    <select id="kind" data-testid="cust-kind">
      <option value="Complaint">Complaint  (something is broken or wrong)</option>
      <option value="Support">Support  (I need help with something)</option>
    </select>
    <label>Priority</label>
    <select id="priority"><option>Low</option><option selected>Medium</option><option>High</option></select>
    <label>Subject</label>
    <input id="subject" maxlength="200" required data-testid="cust-subject" placeholder="Short summary e.g. Internet keeps dropping">
    <label>Describe the issue</label>
    <textarea id="description" rows="5" required data-testid="cust-desc" placeholder="Any helpful details, timing, error messages"></textarea>
    <button class="btn" type="submit" data-testid="cust-submit"><i class="fa fa-paper-plane"></i> Submit Request</button>
    <div id="err" class="err" style="display:none;"></div>
  </form>
</div></div>
<script>
async function submitForm(ev){
  ev.preventDefault();
  const err=document.getElementById('err'); err.style.display='none';
  const body={
    customer_id:'{{ cust.customer_id }}',
    kind:document.getElementById('kind').value,
    priority:document.getElementById('priority').value,
    subject:document.getElementById('subject').value.trim(),
    description:document.getElementById('description').value.trim()
  };
  try{
    const r=await fetch('/api/public/complaints/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(j.success){
      document.getElementById('card').innerHTML =
        '<div class="ok"><i class="fa fa-check-circle"></i> <b>Request submitted!</b><br>Ticket # <b>' + j.ticket_no + '</b>. Our team will reach out shortly.</div>' +
        '<a href="/pay/{{ cust.customer_id }}" class="btn" style="text-decoration:none;text-align:center;display:block;">Back to account</a>';
    } else { err.textContent=j.message||'Something went wrong.'; err.style.display='block'; }
  } catch(e){ err.textContent='Network error — please try again.'; err.style.display='block'; }
  return false;
}
</script></body></html>
