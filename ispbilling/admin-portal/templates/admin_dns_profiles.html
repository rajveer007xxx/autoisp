{% extends "base_admin.html" %}
{% block title %}DNS Profiles - Auto ISP Billing{% endblock %}
{% block content %}
<style>
.dns-card{background:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px;box-shadow:0 2px 12px rgba(11,17,32,.06);}
.dns-input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;}
.dns-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;}
.dns-btn.gray{background:#475569;}
.dns-btn.danger{background:#ef4444;}
.cat-pill{display:inline-block;padding:4px 10px;border-radius:14px;background:#fef3c7;color:#a16207;font-size:11px;margin:2px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
table th{background:#f1f5f9;padding:10px;text-align:left;font-size:12px;text-transform:uppercase;color:#475569;}
table td{padding:10px;border-bottom:1px solid #e2e8f0;font-size:13px;vertical-align:top;}
.empty{text-align:center;padding:40px;color:#94a3b8;}
.tag-default{background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
</style>

<section class="content-header">
  <h1>DNS Content Filtering<small>Per-plan / per-customer DNS profiles pushed to MikroTik</small></h1>
</section>

<section class="content">
  <div class="dns-card">
    <h3 style="margin:0 0 12px;display:flex;align-items:center;gap:8px;">
      <i class="bi bi-shield-fill-check" style="color:#6366f1;"></i> Create DNS Profile
      <button class="dns-btn" style="margin-left:auto;" onclick="loadProfiles()" data-testid="dns-refresh-btn">Refresh</button>
    </h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;">
      <input id="dpName" class="dns-input" placeholder="Name (e.g. Family Safe)" data-testid="dns-name" />
      <input id="dpDesc" class="dns-input" placeholder="Description (optional)" data-testid="dns-desc" />
      <input id="dpUpV4" class="dns-input" placeholder="Upstream IPv4 (e.g. 1.1.1.3)" data-testid="dns-upstream-v4" value="1.1.1.3" />
      <input id="dpUpV6" class="dns-input" placeholder="Upstream IPv6 (optional)" data-testid="dns-upstream-v6" />
    </div>
    <div style="margin-top:10px;font-size:13px;color:#475569;font-weight:600;">Block Categories:</div>
    <div style="margin-top:6px;">
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="adult" /> Adult</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="malware" /> Malware</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="phishing" /> Phishing</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="gambling" /> Gambling</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="social" /> Social Media</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="streaming" /> Streaming</label>
      <label style="margin-right:14px;"><input type="checkbox" class="cat" value="ads" /> Ads/Trackers</label>
      <label style="margin-right:14px;"><input type="checkbox" id="dpDefault" /> Set as Default</label>
    </div>
    <div style="margin-top:14px;">
      <button class="dns-btn" onclick="createProfile()" data-testid="dns-create-btn">Create Profile</button>
    </div>
  </div>

  <div class="dns-card">
    <h3 style="margin:0 0 12px;">Existing Profiles</h3>
    <div id="dnsList"><div class="empty">Loading…</div></div>
  </div>
</section>

<script>
async function loadProfiles(){
  const r = await fetch('/api/admin/dns-profiles', {credentials:'include'});
  const d = await r.json();
  if(!d.success){return;}
  if(d.items.length===0){
    document.getElementById('dnsList').innerHTML='<div class="empty">No profiles yet</div>'; return;
  }
  document.getElementById('dnsList').innerHTML=`
    <table><thead><tr><th>Name</th><th>Upstream</th><th>Categories</th><th>Default</th><th>Actions</th></tr></thead><tbody>
    ${d.items.map(p=>`
      <tr data-testid="dns-row-${p.id}">
        <td><b>${p.name}</b><br><small style="color:#64748b">${p.description||''}</small></td>
        <td><code>${p.upstream_v4}</code>${p.upstream_v6?'<br><code>'+p.upstream_v6+'</code>':''}</td>
        <td>${p.categories.length===0?'<small style="color:#94a3b8">None</small>':p.categories.map(c=>`<span class="cat-pill">${c}</span>`).join('')}</td>
        <td>${p.is_default?'<span class="tag-default">Default</span>':'-'}</td>
        <td>
          <button class="dns-btn" onclick="pushProfile(${p.id})" data-testid="dns-push-${p.id}">Push to MikroTik</button>
          <button class="dns-btn danger" onclick="delProfile(${p.id})" data-testid="dns-del-${p.id}">Delete</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}
async function createProfile(){
  const name=document.getElementById('dpName').value.trim();
  if(!name){alert('Name required');return;}
  const cats=Array.from(document.querySelectorAll('.cat:checked')).map(x=>x.value);
  const body={
    name,
    description: document.getElementById('dpDesc').value.trim(),
    upstream_v4: document.getElementById('dpUpV4').value.trim(),
    upstream_v6: document.getElementById('dpUpV6').value.trim(),
    categories: cats,
    is_default: document.getElementById('dpDefault').checked
  };
  const r=await fetch('/api/admin/dns-profiles',{method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();
  if(d.success){
    document.getElementById('dpName').value='';
    document.getElementById('dpDesc').value='';
    document.querySelectorAll('.cat').forEach(c=>c.checked=false);
    loadProfiles();
  } else alert(d.message);
}
async function pushProfile(id){
  const r=await fetch('/api/admin/dns-profiles/'+id+'/push',{method:'POST',credentials:'include'});
  const d=await r.json();
  if(d.success){
    alert(`Pushed to MikroTik\nProfile: ${d.profile}\nUpstream: ${d.upstream_v4}\nCustomers: ${d.pushed}/${d.total}\nRouter online: ${d.router_online?'YES':'NO (dry-run)'}`);
  } else alert(d.message||'Failed');
}
async function delProfile(id){
  if(!confirm('Delete profile? Plans/customers using it will fall back to default.')) return;
  const r=await fetch('/api/admin/dns-profiles/'+id,{method:'DELETE',credentials:'include'});
  if((await r.json()).success) loadProfiles();
}
loadProfiles();
</script>
{% endblock %}
