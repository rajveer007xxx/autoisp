<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Please wait - Payment Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,sans-serif;
     display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
.box{background:#111827;padding:36px;border-radius:16px;max-width:440px;width:100%;
     border:1px solid #1f2937;text-align:center;}
.spin{width:56px;height:56px;border:4px solid #1f2937;border-top-color:#10b981;
      border-radius:50%;margin:0 auto 22px;animation:s 1s linear infinite;}
@keyframes s{to{transform:rotate(360deg);}}
h2{font-size:22px;margin:6px 0 8px;color:#f1f5f9;}
p{color:#94a3b8;font-size:14px;line-height:1.5;margin-bottom:22px;}
.cd{color:#64748b;font-size:12px;margin-top:16px;}
.cd b{color:#10b981;}
.btn{display:inline-block;padding:10px 18px;background:#10b981;color:#fff;
     border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;
     text-decoration:none;margin-top:8px;}
</style></head><body>
<div class="box">
  <div class="spin"></div>
  <h2>Just a moment&hellip;</h2>
  <p>Our payment service is restarting briefly. This page will reload automatically in a few seconds. <strong>No payment has been lost</strong> - if your bank already deducted money it will be refunded within 4-5 business days or auto-reconciled on our end.</p>
  <a href="#" class="btn" onclick="location.reload(); return false;">Retry Now</a>
  <div class="cd">Auto-retrying in <b id="cd">5</b> seconds&hellip;</div>
</div>
<script>
  var n=5,el=document.getElementById('cd');
  var t=setInterval(function(){
    n--; if(el)el.innerText=n;
    if(n<=0){clearInterval(t);location.reload();}
  },1000);
</script>
</body></html>
