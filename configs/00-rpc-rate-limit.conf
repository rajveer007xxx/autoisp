# /etc/nginx/conf.d/00-rpc-rate-limit.conf
# Phase-D — Lua rate-limit for high-impact RPC endpoints
# (reboot / factory-reset). HTTP-level lua_shared_dict declarations.

# Shared memory zones for atomic counters.
# 10 MB each is far more than enough for thousands of ONUs.
lua_shared_dict rpc_rl_onu 10m;
lua_shared_dict rpc_rl_ip  10m;

# Inline access-phase rate limiter (no external file → no lua_package_path needed).
# Limits ENFORCED:
#   • 1 RPC per ONU id   per 15 seconds
#   • 5 RPCs per client  per 60 seconds  (keyed by X-Forwarded-For / remote_addr)
# Response on breach: HTTP 429 + JSON body + Retry-After header.
init_by_lua_block {
    -- nothing to preload; everything is inline below
}
