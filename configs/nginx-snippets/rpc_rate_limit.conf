# /etc/nginx/snippets/rpc_rate_limit.conf
# Phase-D — Lua-driven rate limit for /api/admin/olt/onus/<id>/rpc/{reboot,factory-reset}
#
# Place ONE include of this file inside each server{} block, BEFORE the
# catch-all `location /api/` directive.

location ~ ^/api/admin/olt/onus/([^/]+)/rpc/(reboot|factory-reset)/?$ {

    set $onu_id  $1;
    set $rpc_op  $2;

    access_by_lua_block {
        local onu_id  = ngx.var.onu_id or ""
        local rpc_op  = ngx.var.rpc_op or ""
        local ip      = ngx.var.http_x_forwarded_for or ngx.var.remote_addr or "unknown"
        -- if XFF is a list, take the leftmost (the real client)
        ip = ip:match("^[^,%s]+") or ip

        local function deny(retry_after, scope)
            ngx.status = 429
            ngx.header["Content-Type"]  = "application/json"
            ngx.header["Retry-After"]   = tostring(retry_after)
            ngx.header["X-RPC-RateLimit-Scope"] = scope
            ngx.log(ngx.WARN,
                    "[rpc-rate-limit] BLOCK scope=", scope,
                    " ip=", ip, " onu=", onu_id, " op=", rpc_op,
                    " retry_after=", retry_after)
            ngx.say(string.format(
              '{"detail":"Rate limit (%s) exceeded for RPC %s on ONU %s. '..
              'Retry in %d seconds.","scope":"%s","retry_after":%d}',
              scope, rpc_op, onu_id, retry_after, scope, retry_after))
            return ngx.exit(429)
        end

        -- ONU-level: 1 RPC per 15s per ONU id.
        local onu_key = "onu:" .. onu_id
        local n, err = ngx.shared.rpc_rl_onu:incr(onu_key, 1, 0, 15)
        if not n then
            ngx.log(ngx.ERR, "[rpc-rate-limit] shared dict err onu: ", err)
        elseif n > 1 then
            local ttl = ngx.shared.rpc_rl_onu:ttl(onu_key) or 15
            return deny(math.ceil(ttl), "onu")
        end

        -- IP-level: 5 RPCs per 60s per client IP.
        local ip_key = "ip:" .. ip
        local m, err2 = ngx.shared.rpc_rl_ip:incr(ip_key, 1, 0, 60)
        if not m then
            ngx.log(ngx.ERR, "[rpc-rate-limit] shared dict err ip: ", err2)
        elseif m > 5 then
            local ttl = ngx.shared.rpc_rl_ip:ttl(ip_key) or 60
            return deny(math.ceil(ttl), "ip")
        end
    }

    # Pass through to admin-portal (own all OLT/ONU RPCs).
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Real-Port       $remote_port;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}
